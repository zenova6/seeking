name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          version: 3.32.0

      - name: Install dependencies
        run: flutter pub get

      - name: Create assets folder and placeholder icon
        run: |
          mkdir -p assets
          # If you have a real icon committed at assets/icon.png this step is skipped
          if [ ! -f assets/icon.png ]; then
            # Create a minimal valid 1x1 PNG as fallback so the build doesn't fail
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > assets/icon.png
          fi

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Inject Gradle init script for compileSdk override
        run: |
          mkdir -p $HOME/.gradle/init.d
          cat > $HOME/.gradle/init.d/compileSdk.gradle << 'GRADLE'
          allprojects {
            afterEvaluate { project ->
              if (project.hasProperty("android")) {
                def android = project.extensions.findByName("android")
                if (android != null) {
                  try { android.compileSdkVersion 36 } catch (Exception ignored) {}
                }
              }
            }
          }
          GRADLE

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: seeking-apk
          path: build/app/outputs/flutter-apk/app-release.apk
