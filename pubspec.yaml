name: seeking
description: "Ideas Vault + Secret Browser + Music Player"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Local DB
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Browser
  webview_flutter: ^4.10.0

  # Audio
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  # file_picker removed

  # YouTube audio extraction
  youtube_explode_dart: ^2.3.3

  # Utils
  path_provider: ^2.1.4
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true